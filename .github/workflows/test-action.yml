name: Test setup-mdtest action

on:
  pull_request:
    paths:
      - '.github/actions/setup-mdtest/**'
      - '.github/workflows/test-action.yml'
  push:
    branches: [main]
    paths:
      - '.github/actions/setup-mdtest/**'
      - '.github/workflows/test-action.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Test action with install-go
        uses: ./.github/actions/setup-mdtest
        with:
          install-go: true
          version: latest

      - name: Verify mdtest is available
        run: mdtest version