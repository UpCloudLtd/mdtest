name: Test setup-mdtest action

on:
  pull_request:
    paths:
      - '.github/actions/setup-mdtest/**'
      - '.github/workflows/test-action.yml'
  push:
    branches: [main]
    paths:
      - '.github/actions/setup-mdtest/**'
      - '.github/workflows/test-action.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test action with install-go
        uses: ./.github/actions/setup-mdtest
        with:
          install-go: true
          version: latest

      - name: Verify mdtest is available
        run: mdtest version